[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2

# Remapping para que `import "@openzeppelin/..."` resuelva al submódulo en lib/.
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# === Redes ===
# La red local (plugins-gas/node/) expone JSON-RPC en :4545, no en 8545.
# Variables ENV opcionales que el script de deploy puede consumir:
#   PRIVATE_KEY  — clave del deployer
#   OWNER        — initial owner del MembershipRegistry (default: msg.sender)
[rpc_endpoints]
local = "http://localhost:4545"
